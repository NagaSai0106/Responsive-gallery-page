<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Men Gallery</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="gallery-container">

    <h1>X-MEN GALLERY</h1>

    <div class="gallery">

        <div class="card">
            <img src="PROFESSOR X.jpeg" alt="Professor X">
            <h3>Professor X</h3>
        </div>

        <div class="card">
            <img src="wolverine.jpeg" alt="Wolverine">
            <h3>Wolverine</h3>
        </div>

        <div class="card">
            <img src="strom.jpeg" alt="Storm">
            <h3>Storm</h3>
        </div>

        <div class="card">
            <img src="Cyclops.jpeg" alt="Cyclops">
            <h3>Cyclops</h3>
        </div>

        <div class="card">
            <img src="Nightcrawler.jpeg" alt="Nightcrawler">
            <h3>Nightcrawler</h3>
        </div>

        <div class="card">
            <img src="Colossus.jpeg" alt="Colossus">
            <h3>Colossus</h3>
        </div>

        <div class="card">
            <img src="beast.jpeg" alt="Beast">
            <h3>Beast</h3>
        </div>

        <div class="card">
            <img src="magneto.jpeg" alt="Magneto">
            <h3>Magneto</h3>
        </div>

        <div class="card">
            <img src="Apocalypse.jpeg" alt="Apocalypse">
            <h3>Apocalypse</h3>
        </div>

    </div>

</section>

</body>
</html>
